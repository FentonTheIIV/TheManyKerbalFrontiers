@Kopernicus:FOR[TMF]
{
    Body
    {
        name = Thoas
        cacheFile = TMF/Cache/Thoas.bin

        Template
        {
            name = Mun
            removeAllPQSMods = true
        }

        Properties
        {
            displayName = Thoas^N
            description = Tiny Thoas shows evidence of tectonic activity.

            radius = 36000
            geeASL = 0.0095

            albedo = 0.55
            tidallyLocked = true
            isHomeWorld = false

            ScienceValues
            {
                landedDataValue = 4
                inSpaceLowDataValue = 3
                inSpaceHighDataValue = 2
                recoveryValue = 3
                spaceAltitudeThreshold = 60000
            }
        }

        Orbit
        {
            referenceBody = Bacchus
            semiMajorAxis = 23200000
            eccentricity = 0.05
            inclination = 2.0
            argumentOfPeriapsis = 0
            longitudeOfAscendingNode = 0
            meanAnomalyAtEpoch = 0
            epoch = 0

            color = 0.7, 0.55, 0.25, 1
        }

        ScaledVersion
        {
            type = Vacuum
            fadeStart = 40000
            fadeEnd = 60000

            Material
            {
                texture = TMF/PluginData/ThoasColour.dds
                normals = TMF/PluginData/ThoasNormal.dds

                shininess = 0.05
                specular = 0.05, 0.05, 0.05, 1
            }
        }

        PQS
        {
            fadeStart = 40000
            fadeEnd = 60000
            deactivateAltitude = 70000

            Mods
            {
                VertexColorMap
                {
                    map = TMF/PluginData/ThoasColour.dds
                    order = 10
                    enabled = true
                }

                VertexHeightMap
                {
                    map = TMF/PluginData/ThoasHeight.dds
                    offset = 0
                    deformity = 1000
                    scaleDeformityByRadius = false
                    order = 20
                    enabled = true
                }
            }
        }
    }
}