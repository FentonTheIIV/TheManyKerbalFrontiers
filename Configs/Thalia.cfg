@Kopernicus:FOR[TMF]
{
    Body
    {
        name = Thalia
        cacheFile = TMF/Cache/Thalia.bin

        Template
        {
            name = Mun
            removeAllPQSMods = true
        }

        Properties
        {
            displayName = Thalia^N
            description = Thalia is the farthest and smallest of Junos' three large moons. Its a very cratered little world with a rich human history and a booming cosmopolitan culture.

            radius = 42067
            geeASL = 0.011

            albedo = 0.55
            tidallyLocked = true
            isHomeWorld = false

            ScienceValues
            {
                landedDataValue = 4
                inSpaceLowDataValue = 3
                inSpaceHighDataValue = 2
                recoveryValue = 3
                spaceAltitudeThreshold = 60000
            }
        }

        Orbit
        {
            referenceBody = Juno
            semiMajorAxis = 27963100
            eccentricity = 0.05
            inclination = 2.0
            argumentOfPeriapsis = 0
            longitudeOfAscendingNode = 0
            meanAnomalyAtEpoch = 0
            epoch = 0

            color = 0.55, 0.55, 0.55, 1
        }

        ScaledVersion
        {
            type = Vacuum
            fadeStart = 40000
            fadeEnd = 60000

            Material
            {
                texture = TMF/PluginData/ThaliaColour.dds
                normals = TMF/PluginData/ThaliaNormal.dds

                shininess = 0.05
                specular = 0.05, 0.05, 0.05, 1
            }
        }

        PQS
        {
            fadeStart = 40000
            fadeEnd = 60000
            deactivateAltitude = 70000

            Mods
            {
                VertexColorMap
                {
                    map = TMF/PluginData/ThaliaColour.dds
                    order = 10
                    enabled = true
                }

                VertexHeightMap
                {
                    map = TMF/PluginData/ThaliaHeight.dds
                    offset = 0
                    deformity = 1000
                    scaleDeformityByRadius = false
                    order = 20
                    enabled = true
                }
            }
        }
    }
}