@Kopernicus:AFTER[Kopernicus] 
{
    body
    {
        name = JCBary
        cacheFile = TMF/Cache/JCBary.bin
        Template
        {
            name = Jool
           	removeAtmosphere = true
			removeAllPQSMods = true
			removeOcean = true 
        }
        Properties
        {
            displayName = Janus-Caelus Barycenter^N
            description = The barycenter of the Janus-Caelus twin planet system
            radius = 1000 // in meters
            mass = 1.8921e24 // in kg

        }
        orbit
        {
            referenceBody = Sun
            semiMajorAxis = 4.4984E+12 // in meters
            inclination = 6.43 // in degrees
            eccentricity = 0.008 // dimensionless
            longitudeOfAscendingNode = 131 // in degrees
            meanAnomalyAtEpoch = 259 // in degrees
            argumentOfPeriapsis = 273 // in degrees
        }
    
    
    
    
    
    }
}